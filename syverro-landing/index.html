<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Syverro — Reading Intelligence System</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="orb"></div>
        <div class="content">
            <h1>Syverro</h1>
            <p class="tagline">Reading Intelligence System</p>
            <div class="divider"></div>
            <p class="description">
                Превращает чтение в структуру, <br>
                аналитику и понимание себя.
            </p>
            <div class="status">
                <div class="indicator"></div>
                <span>Запуск летом 2026</span>
            </div>
            <form class="email-form" id="emailForm">
                <input type="email" placeholder="first.last@example.com" id="emailInput" required>
                <button type="submit">Notify me</button>
            </form>
            <p class="disclaimer" id="formMessage"></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
